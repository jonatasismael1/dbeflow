[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Redireciona o webhook do WhatsApp para a função (URL mais curta, opcional)
[[redirects]]
  from = "/api/whatsapp-webhook"
  to = "/.netlify/functions/whatsapp-webhook"
  status = 200

# SPA: tudo que não for função/asset cai no index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
